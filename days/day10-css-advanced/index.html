<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>Day10 — CSS 进阶</title>
<style>
  body { font-family: sans-serif; max-width: 800px; margin: 40px auto; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; color: #c9d1d9; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
  .animate { animation: fadeIn 1s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style></head>
<body><h1>CSS 进阶 — Grid / 响应式 / 动画</h1><div class="grid"><div class="card animate">Grid 1</div><div class="card animate">Grid 2</div><div class="card animate">Grid 3</div></div></body>
</html>
